name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t kids-edu-api:ci .

      - name: Build Web image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost/api/v1 \
            --build-arg NEXT_PUBLIC_APP_URL=http://localhost \
            -t kids-edu-web:ci .

  env-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production env template
        run: |
          cp .env.production.example .env.ci
          sed -i 's/change-me-strong-password/ci-postgres-pass-123/' .env.ci
          sed -i 's/replace-with-64-char-random-access-secret-minimum-length-32/ci-access-secret-32chars-minimum-ok/' .env.ci
          sed -i 's/replace-with-64-char-random-refresh-secret-minimum-length-32/ci-refresh-secret-32chars-minimum-ok/' .env.ci
          chmod +x deploy/scripts/validate-env.sh
          ./deploy/scripts/validate-env.sh .env.ci
